<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="#0A0908"/>
  <!-- SOMA F5 Onda mark: oval + sine wave -->
  <g fill="none" stroke="#C8FB5A" stroke-linecap="round">
    <!-- Oval -->
    <ellipse cx="50" cy="50" rx="32" ry="30" stroke-width="6"/>
    <!-- Sine wave path -->
    <path d="M 26 50 Q 34 35 42 50 T 58 50 T 74 50" stroke-width="3.5"/>
  </g>
</svg>
